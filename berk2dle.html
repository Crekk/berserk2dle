<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berserk2dle</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Berserk2dle</h1>
    <p>Guess the Berserk 2 character of the day!</p>

    <div class="controls">
      <div class="guess-search">
        <input id="guessInput" placeholder="Enter a character name" autocomplete="off">
        <div id="suggestions" class="suggestions hidden"></div>
      </div>
      <button id="guessButton" type="button">Guess</button>
    </div>

    <div class="dev-controls">
      <label for="targetOverride">Dev target</label>
      <select id="targetOverride">
        <option value="">Random daily target</option>
      </select>
    </div>

    <p id="status" class="status"></p>

    <div class="legend">
      <span class="legend-item"><span class="swatch exact"></span> Exact match</span>
      <span class="legend-item"><span class="swatch partial"></span> Partial match</span>
      <span class="legend-item"><span class="swatch none"></span> No match</span>
      <span class="legend-item">Size / Debut arrows point toward the target</span>
    </div>

    <div id="board" class="board"></div>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
