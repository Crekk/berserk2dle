<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berserk2dle</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <img class="logo" src="img/berserk2dle.png" alt="Berserk2dle">

    <div class="mode-tabs" aria-label="Game mode">
      <button class="mode-tab" type="button" data-mode="classic">Classic</button>
      <button class="mode-tab" type="button" data-mode="splash">Splash</button>
    </div>

    <div class="controls">
      <div class="guess-search">
        <input id="guessInput" placeholder="Enter a character name" autocomplete="off">
        <div id="suggestions" class="suggestions hidden"></div>
      </div>
      <button id="guessButton" type="button">Guess</button>
      <button id="clearCacheButton" class="dev-button" type="button">Clear dev cache</button>
    </div>

    <div class="dev-controls">
      <label for="targetOverride">Dev target</label>
      <select id="targetOverride">
        <option value="">Random daily target</option>
      </select>
    </div>

    <p id="puzzleMeta" class="puzzle-meta"></p>
    <p id="status" class="status"></p>

    <div id="classicLegend" class="legend">
      <span class="legend-item"><span class="swatch exact"></span> Exact match</span>
      <span class="legend-item"><span class="swatch partial"></span> Partial match</span>
      <span class="legend-item"><span class="swatch none"></span> No match</span>
    </div>

    <div id="splashPanel" class="splash-panel hidden">
      <div class="splash-art-wrap">
        <img id="splashArt" class="splash-art" alt="Splash art">
      </div>
      <p id="splashHint" class="splash-hint"></p>
      <div id="splashGuesses" class="splash-guesses"></div>
    </div>

    <div id="board" class="board"></div>
  </main>

  <div id="winModal" class="modal-backdrop hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="winTitle">
      <button id="closeWinModal" class="modal-close" type="button" aria-label="Close">x</button>
      <h2 id="winTitle">You got it</h2>
      <p id="winSummary"></p>
      <textarea id="shareMessage" readonly></textarea>
      <button id="copyShareButton" type="button">Copy result</button>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
